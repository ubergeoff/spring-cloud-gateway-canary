services:

  # ── Service registry ──────────────────────────────────────────────────────
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      # Override the localhost hostname so Eureka advertises the correct
      # container name to other services inside the Docker network.
      EUREKA_INSTANCE_HOSTNAME: eureka-server
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 40s

  # ── Database ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: usersdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── User services ─────────────────────────────────────────────────────────
  # Both instances build from the same ./user-service image.
  # DEPLOYMENT_STATE and INSTANCE_NAME differentiate them at runtime.
  user-service-a:
    build: ./user-service
    container_name: user-service-a
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      INSTANCE_NAME: user-service-a
      DEPLOYMENT_STATE: active
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/usersdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    networks:
      - backend
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  user-service-b:
    build: ./user-service
    container_name: user-service-b
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      INSTANCE_NAME: user-service-b
      DEPLOYMENT_STATE: passive
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/usersdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    networks:
      - backend
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ── API Gateway ───────────────────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - backend
    depends_on:
      eureka-server:
        condition: service_healthy

  # ── Observability stack ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - backend
    depends_on:
      - prometheus

networks:
  backend:
    driver: bridge

volumes:
  grafana-data:
  postgres-data:
