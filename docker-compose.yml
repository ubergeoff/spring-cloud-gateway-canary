services:

  # ── Service registry ──────────────────────────────────────────────────────
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      # Override the localhost hostname so Eureka advertises the correct
      # container name to other services inside the Docker network.
      EUREKA_INSTANCE_HOSTNAME: eureka-server
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 40s

  # ── User services ─────────────────────────────────────────────────────────
  user-service-a:
    build: ./user-service-a
    container_name: user-service-a
    ports:
      - "8081:8081"
    environment:
      # Point at the eureka-server container instead of localhost
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - backend
    depends_on:
      eureka-server:
        condition: service_healthy

  user-service-b:
    build: ./user-service-b
    container_name: user-service-b
    ports:
      - "8082:8082"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - backend
    depends_on:
      eureka-server:
        condition: service_healthy

  # ── API Gateway ───────────────────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - backend
    depends_on:
      eureka-server:
        condition: service_healthy

  # ── Observability stack ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - backend
    depends_on:
      - prometheus

networks:
  backend:
    driver: bridge

volumes:
  grafana-data:
