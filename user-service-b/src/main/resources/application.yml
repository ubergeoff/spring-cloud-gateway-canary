server:
  port: 8082

spring:
  application:
    # Must match the lb://user-service URI in the gateway routes
    name: user-service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 15
    # This metadata key is read by MetadataAwareServiceInstanceFilter in the gateway
    metadata-map:
      deployment-state: passive

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.example.userserviceb: DEBUG
